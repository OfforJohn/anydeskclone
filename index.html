<!DOCTYPE html>
<html>
<head>
    <title>PC Screen Sender</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; }
        video { width: 80%; border: 2px solid #333; background: #000; }
        input { padding: 10px; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .error { color: red; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>
    <h2>PC Screen Sender (WebRTC)</h2>
    <div id="security-warning" class="error" style="display:none;">
        ⚠️ ERROR: Your browser is blocking screen sharing because this page is not "Secure". <br>
        Please use <b>http://localhost:3001</b> exactly.
    </div>
    <div class="controls">
        <input type="text" id="roomId" placeholder="Meeting ID (e.g. 555)">
        <button onclick="startSharing()">Start Sharing Screen</button>
        <button onclick="resendOffer()" style="background: #28a745;">Resend Connection Request</button>
    </div>
    <video id="localVideo" autoplay playsinline muted></video>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            document.getElementById('security-warning').style.display = 'block';
        }

        const socket = io();
        let peerConnection;
        let localStream;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        async function startSharing() {
            const roomId = document.getElementById('roomId').value;
            if (!roomId) { alert("Please enter a Meeting ID"); return; }
            socket.emit("join", roomId);

            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('localVideo').srcObject = localStream;
                await createPeerConnection(roomId);
            } catch (err) {
                console.error("Error sharing screen: ", err);
            }
        }

        async function createPeerConnection(roomId) {
            console.log("Setting up connection for room:", roomId);
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            socket.emit("message", {
                roomId,
                offer: { sdp: offer.sdp, type: offer.type }
            });
            console.log("OFFER sent to Android");

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("message", { roomId, candidate: event.candidate });
                }
            };
        }

        async function resendOffer() {
            const roomId = document.getElementById('roomId').value;
            if (peerConnection) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit("message", { roomId, offer: { sdp: offer.sdp, type: offer.type } });
                console.log("RESENT OFFER to Android");
            }
        }

        socket.on("new-peer", () => {
            console.log("A new device joined! Auto-resending offer...");
            resendOffer();
        });

        socket.on("message", async (data) => {
            if (data.answer) {
                console.log("Received ANSWER from Android");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate && peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on("connect", () => console.log("Connected to signaling server"));
    </script>
</body>
</html>
