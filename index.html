<!DOCTYPE html>
<html>
<head>
    <title>PC Screen Sender</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; }
        video { width: 80%; border: 2px solid #333; background: #000; }
        input { padding: 10px; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .error { color: red; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>
    <h2>PC Screen Sender (WebRTC)</h2>
    <div id="security-warning" class="error" style="display:none;">
        ⚠️ ERROR: Your browser is blocking screen sharing because this page is not "Secure". <br>
        Please use <b>http://localhost:3001</b> exactly.
    </div>
    <div class="controls">
        <input type="text" id="roomId" placeholder="Meeting ID (e.g. 555)">
        <button onclick="startSharing()">Start Sharing Screen</button>
        <button onclick="resendOffer()" style="background: #28a745;">Resend Connection Request</button>
    </div>
    <div style="display: flex; gap: 20px; width: 100%; justify-content: center; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 300px; text-align: center;">
            <h3>Your Screen (PC)</h3>
            <video id="localVideo" autoplay playsinline muted style="width: 100%; border: 1px solid #333; background: #000;"></video>
        </div>
        <div style="flex: 1; min-width: 300px; text-align: center;">
            <h3>Remote Android Screen</h3>
            <video id="remoteVideo" autoplay playsinline style="width: 100%; border: 1px solid #CC0000; background: #000;"></video>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            document.getElementById('security-warning').style.display = 'block';
        }

        const socket = io();
        let peerConnection;
        let localStream;
        const remoteVideo = document.getElementById('remoteVideo');
        const config = {
          iceServers: [
              {
                urls: "stun:stun.relay.metered.ca:80",
              },
              {
                urls: "turn:global.relay.metered.ca:80",
                username: "d96b37d0e903f99258135973",
                credential: "1lHMKzPiNxyHbls9",
              },
              {
                urls: "turn:global.relay.metered.ca:80?transport=tcp",
                username: "d96b37d0e903f99258135973",
                credential: "1lHMKzPiNxyHbls9",
              },
              {
                urls: "turn:global.relay.metered.ca:443",
                username: "d96b37d0e903f99258135973",
                credential: "1lHMKzPiNxyHbls9",
              },
              {
                urls: "turns:global.relay.metered.ca:443?transport=tcp",
                username: "d96b37d0e903f99258135973",
                credential: "1lHMKzPiNxyHbls9",
              },
          ],
        };

        async function startSharing() {
            const roomId = document.getElementById('roomId').value;
            if (!roomId) { alert("Please enter a Meeting ID"); return; }
            socket.emit("join", roomId);

            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('localVideo').srcObject = localStream;
                await createPeerConnection(roomId);
            } catch (err) {
                console.error("Error sharing screen: ", err);
            }
        }

        async function createPeerConnection(roomId) {
            console.log("[LAPTOP] Initializing RTCPeerConnection with config:", config);
            peerConnection = new RTCPeerConnection(config);

            peerConnection.oniceconnectionstatechange = () => {
                console.log("[LAPTOP] ICE Connection State Changed:", peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === "failed") {
                    console.error("[LAPTOP] ICE Connection FAILED. This usually means TURN/STUN failed to bypass the firewall.");
                }
            };

            peerConnection.onconnectionstatechange = () => {
                console.log("[LAPTOP] Peer Connection State:", peerConnection.connectionState);
            };

            peerConnection.onsignalingstatechange = () => {
                console.log("[LAPTOP] Signaling State:", peerConnection.signalingState);
            };

            peerConnection.onicegatheringstatechange = () => {
                console.log("[LAPTOP] ICE Gathering State:", peerConnection.iceGatheringState);
            };

            peerConnection.onicecandidateerror = (event) => {
                console.error("[LAPTOP] ICE Candidate Error! URL:", event.url, "Error Code:", event.errorCode, "Text:", event.errorText);
            };

            peerConnection.ontrack = (event) => {
                console.log("[LAPTOP] RECEIVED REMOTE TRACK:", event.track.kind, "Streams:", event.streams.length);
                const stream = event.streams[0] || new MediaStream([event.track]);
                if (remoteVideo.srcObject !== stream) {
                    console.log("[LAPTOP] Binding remote stream to video element");
                    remoteVideo.srcObject = stream;
                    // Ensure the video plays even if autoplay is restricted
                    remoteVideo.play().catch(e => console.error("[LAPTOP] Play error:", e));
                }
            };

            if (localStream) {
                console.log("[LAPTOP] Adding local tracks to PeerConnection");
                localStream.getTracks().forEach(track => {
                    console.log("[LAPTOP] Adding track:", track.kind);
                    peerConnection.addTrack(track, localStream);
                });
            }

            const offer = await peerConnection.createOffer();
            console.log("[LAPTOP] Created OFFER, setting local description");
            await peerConnection.setLocalDescription(offer);

            socket.emit("message", {
                roomId,
                offer: { sdp: offer.sdp, type: offer.type }
            });
            console.log("[LAPTOP] OFFER sent to server for Android");

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const parts = event.candidate.candidate.split(' ');
                    const type = parts[7]; // candidate type is usually the 8th field
                    console.log(`[LAPTOP] LOCAL ICE CANDIDATE gathered (${type}):`, event.candidate.candidate.substring(0, 50) + "...");

                    if (type === "relay") {
                        console.log("[LAPTOP] SUCCESS: Found a RELAY candidate (TURN server is working)");
                    }

                    socket.emit("message", { roomId, candidate: event.candidate });
                }
            };
        }

        async function resendOffer() {
            const roomId = document.getElementById('roomId').value;
            if (peerConnection) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit("message", { roomId, offer: { sdp: offer.sdp, type: offer.type } });
                console.log("RESENT OFFER to Android");
            }
        }

        socket.on("new-peer", () => {
            console.log("A new device joined!");
            if (localStream) {
                console.log("I am already sharing. Sending offer to new peer...");
                resendOffer();
            }
        });

        socket.on("message", async (data) => {
            if (data.offer) {
                console.log("[LAPTOP] RECEIVED OFFER from Android");
                if (!peerConnection) {
                    console.log("[LAPTOP] PeerConnection missing, creating now...");
                    await createPeerConnection(data.roomId);
                } else if (peerConnection.signalingState !== "stable") {
                    // Signaling collision detected!
                    // Laptop is the "polite" peer and will rollback its own offer to accept the phone's.
                    console.log("[LAPTOP] Signaling collision - rolling back to accept Android offer");
                    await Promise.all([
                        peerConnection.setLocalDescription({type: "rollback"}),
                        peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer))
                    ]);
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit("message", {
                        roomId: data.roomId,
                        answer: { sdp: answer.sdp, type: answer.type }
                    });
                    console.log("[LAPTOP] Rolled back and sent ANSWER to Android");
                    return;
                }

                console.log("[LAPTOP] Setting Remote Description from Android Offer");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                console.log("[LAPTOP] Created ANSWER, setting local description");
                await peerConnection.setLocalDescription(answer);
                socket.emit("message", {
                    roomId: data.roomId,
                    answer: { sdp: answer.sdp, type: answer.type }
                });
                console.log("[LAPTOP] Sent ANSWER to Android");
            } else if (data.answer) {
                console.log("[LAPTOP] RECEIVED ANSWER from Android, setting Remote Description");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate && peerConnection) {
                // console.log("[LAPTOP] RECEIVED ICE CANDIDATE from Android");
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on("connect", () => console.log("Connected to signaling server"));
    </script>
</body>
</html>
